name:  CI Monorepo

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name:  Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: |
            backend-ts/package-lock.json
            Frontend-next/package-lock.json
      # ===== BACKEND =====
      - name:  Install backend
        working-directory: backend-ts
        run: npm ci

      - name:  Test backend
        working-directory: backend-ts
        run: npm run test --if-present

      - name: 🏗 Build backend
        working-directory: backend-ts
        run: npm run build

      # ===== FRONTEND =====
      - name:  Install frontend
        working-directory: Frontend-next
        run: npm ci

      - name: 🏗 Build frontend
        working-directory: Frontend-next
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}

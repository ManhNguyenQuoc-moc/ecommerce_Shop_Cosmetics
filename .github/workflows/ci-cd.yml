name: 🚀 Full CI/CD Monorepo

on:
  push:
    branches: ["main"]

jobs:
  ci:
    name: 🧪 Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: ⚡ Cache npm
        uses: actions/cache@v3
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}

      # ===== BACKEND =====
      - name: 📦 Install backend
        run: |
          cd backend-ts
          npm install

      - name: 🧪 Test backend
        run: |
          cd backend-ts
          npm run test --if-present

      - name: 🏗 Build backend
        run: |
          cd backend-ts
          npm run build

      # ===== FRONTEND =====
      - name: 📦 Install frontend
        run: |
          cd Frontend-next
          npm install

      - name: 🏗 Build frontend
        run: |
          cd Frontend-next
          npm run build

  cd:
    name: 🚀 Deploy VPS
    needs: ci
    runs-on: ubuntu-latest

    steps:
      - name: 🚀 Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /var/www/my-app

            echo "📥 Pull code"
            git pull origin main

            echo "📦 Backend setup"
            cd backend-ts
            npm install
            npm run build

            echo "📦 Frontend setup"
            cd ../Frontend-next
            npm install
            npm run build

            echo "♻️ Restart app"
            pm2 restart all